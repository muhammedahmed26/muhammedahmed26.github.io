<!DOCTYPE html>
<html>
<head>
  <title>Watch Heritage</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      overflow-x:hidden;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111;
      position:sticky;
      top:0;
      z-index:1000;
    }

    nav a{
      color:gold;
      margin:6px;
      text-decoration:none;
      font-weight:bold;
      display:inline-block;
      padding:6px 10px;
    }

    /* 🌟 CLEAN HERO */
    .hero{
      text-align:center;
      padding:120px 15px;
      position:relative;
      overflow:hidden;
      background: radial-gradient(circle at center, #111 0%, #000 70%, #000 100%);
    }

    /* 🕒 LARGE FAINT CLOCK BACKGROUND */
    .hero::before{
      content:"12:00";
      position:absolute;
      font-size:220px;
      font-weight:bold;
      color:rgba(255,215,0,0.05);
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      letter-spacing:10px;
      user-select:none;
    }

    .hero::after{
      content:"";
      position:absolute;
      width:420px;
      height:420px;
      border:2px solid rgba(255,215,0,0.06);
      border-radius:50%;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
    }

    .digital-clock{
      position:relative;
      font-size:42px;
      font-weight:bold;
      color:gold;
      letter-spacing:3px;
      margin-top:15px;
      text-shadow:0 0 18px rgba(255,215,0,0.5);
    }

    .hero h1{
      font-size:34px;
      margin:0;
      position:relative;
    }

    .hero p{
      color:#bbb;
      font-size:14px;
      margin:10px 0 20px;
      position:relative;
    }

    .btn{
      background:gold;
      color:black;
      padding:12px 20px;
      border:none;
      font-weight:bold;
      border-radius:5px;
      text-decoration:none;
      display:inline-block;
      position:relative;
    }

    /* 🌟 CARDS */
    .grid{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:25px;
      padding:40px 15px;
    }

    .card{
      width:260px;
      background:linear-gradient(145deg,#1c1c1c,#0f0f0f);
      border-radius:15px;
      overflow:hidden;
      transition:0.4s;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
    }

    .card:hover{
      transform:translateY(-10px);
      box-shadow:0 20px 50px rgba(255,215,0,0.15);
    }

    .card img{
      width:100%;
      height:190px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
      text-align:center;
    }

    .card h3{
      color:gold;
      margin:5px 0;
    }

    .card p{
      color:#bbb;
      font-size:13px;
    }

    .card-btn{
      display:inline-block;
      padding:8px 14px;
      background:gold;
      color:black;
      text-decoration:none;
      font-weight:bold;
      border-radius:5px;
      margin-top:8px;
    }

    /* 📱 MOBILE */
    @media (max-width:768px){
      .hero h1{font-size:24px;}
      .grid{flex-direction:column;align-items:center;}
      .card{width:90%;}
      nav a{display:block;margin:5px 0;}
      .digital-clock{font-size:30px;}
      .hero::before{font-size:140px;}
      .hero::after{width:300px;height:300px;}
    }

  </style>
</head>

<body>

<header>
  <h2>Watch Heritage</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="luxury.html">Luxury</a>
    <a href="sports.html">Sports</a>
    <a href="fashion.html">Fashion</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- 🌟 HERO -->
<div class="hero">

  <h1>Luxury Watches for Everyone</h1>
  <p>Premium • Stylish • Timeless</p>

  <!-- ⏰ LIVE CLOCK -->
  <div class="digital-clock" id="clock">00:00:00</div>

  <a href="luxury.html" class="btn">Shop Now</a>

</div>

<!-- 🌟 CARDS -->
<div class="grid">

  <div class="card">
    <img src="lux1.jpg">
    <div class="card-content">
      <h3>Luxury</h3>
      <p>Elite premium watch collection</p>
      <a class="card-btn" href="luxury.html">Explore</a>
    </div>
  </div>

  <div class="card">
    <img src="sport1.jpg">
    <div class="card-content">
      <h3>Sports</h3>
      <p>Performance & durability watches</p>
      <a class="card-btn" href="sports.html">Explore</a>
    </div>
  </div>

  <div class="card">
    <img src="fashion1.jpg">
    <div class="card-content">
      <h3>Fashion</h3>
      <p>Modern stylish everyday watches</p>
      <a class="card-btn" href="fashion.html">Explore</a>
    </div>
  </div>

</div>

<!-- ⏰ CLOCK SCRIPT -->
<script>
function updateClock(){
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let s = now.getSeconds();

  h = h < 10 ? "0" + h : h;
  m = m < 10 ? "0" + m : m;
  s = s < 10 ? "0" + s : s;

  document.getElementById("clock").innerText = h + ":" + m + ":" + s;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
