<!DOCTYPE html>
<html>
<head>
  <title>Watch Heritage</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#000;
      color:white;
      overflow:hidden;
    }

    /* 🌟 ENTRANCE SCREEN */
    .hero{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      position:relative;
      text-align:center;
    }

    /* soft luxury glow circle */
    .hero::before{
      content:"";
      position:absolute;
      width:500px;
      height:500px;
      border-radius:50%;
      border:1px solid rgba(255,215,0,0.06);
      box-shadow:0 0 120px rgba(255,215,0,0.04);
    }

    /* ⏰ LIVE CLOCK */
    .clock{
      font-size:75px;
      font-weight:bold;
      color:gold;
      letter-spacing:3px;
      text-shadow:0 0 25px rgba(255,215,0,0.6);
      z-index:2;
    }

    .subtitle{
      margin-top:10px;
      color:#bbb;
      z-index:2;
    }

    .enter-btn{
      margin-top:25px;
      padding:12px 25px;
      background:gold;
      color:black;
      font-weight:bold;
      border:none;
      border-radius:6px;
      cursor:pointer;
      z-index:2;
      text-decoration:none;
    }

    /* 🧲 FLOATING WATCHES */
    .watch{
      position:absolute;
      width:110px;
      height:150px;
      background:#111;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      animation: float 5s ease-in-out infinite;
      opacity:0.9;
    }

    .watch img{
      width:100%;
      height:110px;
      object-fit:cover;
    }

    .watch p{
      margin:0;
      text-align:center;
      font-size:11px;
      padding:5px;
      color:gold;
    }

    .w1{top:15%;left:10%;}
    .w2{top:70%;left:12%; animation-delay:1s;}
    .w3{top:20%;right:10%; animation-delay:2s;}
    .w4{top:65%;right:12%; animation-delay:3s;}

    @keyframes float{
      0%{transform:translateY(0);}
      50%{transform:translateY(-18px);}
      100%{transform:translateY(0);}
    }

  </style>
</head>

<body>

<div class="hero">

  <!-- floating watches -->
  <div class="watch w1">
    <img src="lux1.jpg">
    <p>Luxury</p>
  </div>

  <div class="watch w2">
    <img src="sport1.jpg">
    <p>Sports</p>
  </div>

  <div class="watch w3">
    <img src="fashion1.jpg">
    <p>Fashion</p>
  </div>

  <div class="watch w4">
    <img src="lux2.jpg">
    <p>Premium</p>
  </div>

  <!-- clock -->
  <div class="clock" id="clock">00:00:00</div>

  <div class="subtitle">Welcome to Watch Heritage</div>

  <a href="index.html" class="enter-btn">Enter Store</a>

</div>

<script>
function updateClock(){
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let s = now.getSeconds();

  h = h < 10 ? "0" + h : h;
  m = m < 10 ? "0" + m : m;
  s = s < 10 ? "0" + s : s;

  document.getElementById("clock").innerText =
    h + ":" + m + ":" + s;
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
