<!DOCTYPE html>
<html>
<head>
  <title>Watch Heritage</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111;
      position:sticky;
      top:0;
    }

    nav a{
      color:gold;
      margin:8px;
      text-decoration:none;
      font-weight:bold;
      display:inline-block;
    }

    .hero{
      text-align:center;
      padding:50px 15px;
      background:linear-gradient(to bottom, #111, #000);
    }

    .hero h1{
      font-size:32px;
    }

    .hero p{
      color:#bbb;
      font-size:14px;
    }

    .btn{
      background:gold;
      color:black;
      padding:12px 18px;
      border:none;
      font-weight:bold;
      border-radius:5px;
    }

    .grid{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      padding:15px;
      gap:15px;
    }

    .card{
      background:#1c1c1c;
      width:250px;
      border-radius:10px;
      overflow:hidden;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .card h3{
      text-align:center;
      padding:10px;
    }

    /* 📱 MOBILE */
    @media (max-width:768px){
      .hero h1{font-size:24px;}
      .grid{flex-direction:column;align-items:center;}
      .card{width:90%;}
      nav a{display:block;margin:5px 0;}
    }
  </style>
</head>

<body>

<header>
  <h2>Watch Heritage</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="luxury.html">Luxury</a>
    <a href="sports.html">Sports</a>
    <a href="fashion.html">Fashion</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="hero">
  <h1>Luxury Watches for Everyone</h1>
  <p>Premium • Affordable • Stylish</p>
  <a href="luxury.html"><button class="btn">Shop Now</button></a>
</div>

<div class="grid">

  <div class="card">
    <img src="lux1.jpg">
    <h3>Luxury Collection</h3>
  </div>

  <div class="card">
    <img src="sport1.jpg">
    <h3>Sports Collection</h3>
  </div>

  <div class="card">
    <img src="fashion1.jpg">
    <h3>Fashion Collection</h3>
  </div>

</div>

</body>
</html>
