<!DOCTYPE html>
<html>
<head>
  <title>Watch Heritage</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111;
      position:sticky;
      top:0;
      z-index:1000;
    }

    nav a{
      color:gold;
      margin:6px;
      text-decoration:none;
      font-weight:bold;
      display:inline-block;
      padding:6px 10px;
    }

    /* 🔥 HERO WITH ANIMATION */
    .hero{
      text-align:center;
      padding:80px 15px;
      color:white;
      background: linear-gradient(-45deg, #111, #000, #1c1c1c, #000);
      background-size: 400% 400%;
      animation: bgMove 8s ease infinite;
      position: relative;
      overflow: hidden;
    }

    @keyframes bgMove {
      0% {background-position:0% 50%;}
      50% {background-position:100% 50%;}
      100% {background-position:0% 50%;}
    }

    /* floating watch */
    .hero::before{
      content:"⌚";
      font-size:80px;
      position:absolute;
      top:20px;
      left:-100px;
      opacity:0.15;
      animation: floatWatch 6s linear infinite;
    }

    @keyframes floatWatch {
      0% {left:-100px; transform:rotate(0deg);}
      100% {left:110%; transform:rotate(360deg);}
    }

    .hero h1{
      font-size:34px;
      margin:0;
    }

    .hero p{
      color:#bbb;
      font-size:14px;
      margin:10px 0 20px;
    }

    .btn{
      background:gold;
      color:black;
      padding:12px 20px;
      border:none;
      font-weight:bold;
      border-radius:5px;
      text-decoration:none;
      display:inline-block;
    }

    .grid{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      padding:15px;
      gap:15px;
    }

    .card{
      background:#1c1c1c;
      width:250px;
      border-radius:10px;
      overflow:hidden;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .card h3{
      text-align:center;
      padding:10px;
    }

    /* 📱 MOBILE FIX */
    @media (max-width:768px){
      .hero h1{font-size:24px;}
      .grid{flex-direction:column;align-items:center;}
      .card{width:90%;}
      nav a{display:block;margin:5px 0;}
    }
  </style>
</head>

<body>

<header>
  <h2>Watch Heritage</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="luxury.html">Luxury</a>
    <a href="sports.html">Sports</a>
    <a href="fashion.html">Fashion</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="hero">
  <h1>Luxury Watches for Everyone</h1>
  <p>Premium • Affordable • Stylish</p>
  <a href="luxury.html" class="btn">Shop Now</a>
</div>

<div class="grid">

  <div class="card">
    <img src="lux1.jpg">
    <h3>Luxury Collection</h3>
  </div>

  <div class="card">
    <img src="sport1.jpg">
    <h3>Sports Collection</h3>
  </div>

  <div class="card">
    <img src="fashion1.jpg">
    <h3>Fashion Collection</h3>
  </div>

</div>

</body>
</html>
