<!DOCTYPE html>
<html>
<head>
  <title>Watch Heritage</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      overflow:hidden;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111;
      position:sticky;
      top:0;
      z-index:10;
    }

    nav a{
      color:gold;
      margin:6px;
      text-decoration:none;
      font-weight:bold;
      display:inline-block;
      padding:6px 10px;
    }

    /* 🌟 HERO */
    .hero{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      position:relative;
      text-align:center;
      background:#000;
    }

    /* 🕒 BIG FAINT BACKGROUND CLOCK */
    .hero::before{
      content:"";
      position:absolute;
      width:420px;
      height:420px;
      border-radius:50%;
      border:2px solid rgba(255,215,0,0.05);
      box-shadow:0 0 100px rgba(255,215,0,0.03);
    }

    /* ⏰ LIVE CLOCK */
    .clock{
      font-size:70px;
      font-weight:bold;
      color:gold;
      letter-spacing:3px;
      text-shadow:0 0 20px rgba(255,215,0,0.5);
      z-index:2;
    }

    /* 🌟 FLOATING WATCH CARDS */
    .float-container{
      position:absolute;
      width:100%;
      height:100%;
      pointer-events:none;
    }

    .watch{
      position:absolute;
      width:120px;
      height:160px;
      background:#1c1c1c;
      border-radius:12px;
      overflow:hidden;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      animation: float 6s ease-in-out infinite;
    }

    .watch img{
      width:100%;
      height:120px;
      object-fit:cover;
    }

    .watch p{
      margin:0;
      text-align:center;
      font-size:12px;
      padding:5px;
      color:gold;
    }

    /* positions */
    .w1{top:15%;left:10%; animation-delay:0s;}
    .w2{top:65%;left:15%; animation-delay:1s;}
    .w3{top:20%;right:12%; animation-delay:2s;}
    .w4{top:60%;right:10%; animation-delay:3s;}

    @keyframes float{
      0%{transform:translateY(0px);}
      50%{transform:translateY(-20px);}
      100%{transform:translateY(0px);}
    }

  </style>
</head>

<body>

<header>
  <h2>Watch Heritage</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="luxury.html">Luxury</a>
    <a href="sports.html">Sports</a>
    <a href="fashion.html">Fashion</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="hero">

  <!-- floating watches -->
  <div class="float-container">
    <div class="watch w1">
      <img src="lux1.jpg">
      <p>Luxury</p>
    </div>

    <div class="watch w2">
      <img src="sport1.jpg">
      <p>Sports</p>
    </div>

    <div class="watch w3">
      <img src="fashion1.jpg">
      <p>Fashion</p>
    </div>

    <div class="watch w4">
      <img src="lux2.jpg">
      <p>Premium</p>
    </div>
  </div>

  <!-- clock -->
  <div class="clock" id="clock">00:00:00</div>

</div>

<script>
function updateClock(){
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let s = now.getSeconds();

  h = h < 10 ? "0" + h : h;
  m = m < 10 ? "0" + m : m;
  s = s < 10 ? "0" + s : s;

  document.getElementById("clock").innerText =
    h + ":" + m + ":" + s;
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
