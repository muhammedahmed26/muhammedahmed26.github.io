<!DOCTYPE html>
<html>
<head>
  <title>Watch Heritage</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      overflow-x:hidden;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111;
      position:sticky;
      top:0;
      z-index:1000;
    }

    nav a{
      color:gold;
      margin:6px;
      text-decoration:none;
      font-weight:bold;
      display:inline-block;
      padding:6px 10px;
    }

    /* 🌟 CLEAN HERO */
    .hero{
      text-align:center;
      padding:110px 15px;
      position:relative;
      overflow:hidden;
      background: radial-gradient(circle at center, #111 0%, #000 60%, #000 100%);
    }

    /* floating watch */
    .hero::before{
      content:"⌚";
      position:absolute;
      font-size:80px;
      opacity:0.08;
      top:20%;
      left:-100px;
      animation: float1 12s linear infinite;
    }

    /* floating gear */
    .hero::after{
      content:"⚙️";
      position:absolute;
      font-size:90px;
      opacity:0.06;
      bottom:10%;
      right:-120px;
      animation: float2 10s linear infinite;
    }

    /* ticking circle */
    .clock-bg{
      position:absolute;
      width:320px;
      height:320px;
      border:2px solid rgba(255,215,0,0.08);
      border-radius:50%;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      animation: tick 1s infinite steps(2);
    }

    /* ⏰ LIVE DIGITAL CLOCK */
    .digital-clock{
      position:relative;
      font-size:42px;
      font-weight:bold;
      color:gold;
      letter-spacing:2px;
      margin-top:10px;
      text-shadow:0 0 20px rgba(255,215,0,0.6);
    }

    @keyframes tick{
      0% {transform:translate(-50%,-50%) scale(1);}
      50% {transform:translate(-50%,-50%) scale(1.03);}
      100% {transform:translate(-50%,-50%) scale(1);}
    }

    @keyframes float1{
      0% {transform:translateX(0) rotate(0deg);}
      100% {transform:translateX(120vw) rotate(360deg);}
    }

    @keyframes float2{
      0% {transform:translateX(0) rotate(0deg);}
      100% {transform:translateX(-120vw) rotate(-360deg);}
    }

    .hero h1{
      font-size:34px;
      margin:0;
      position:relative;
    }

    .hero p{
      color:#bbb;
      font-size:14px;
      margin:10px 0 20px;
      position:relative;
    }

    .btn{
      background:gold;
      color:black;
      padding:12px 20px;
      border:none;
      font-weight:bold;
      border-radius:5px;
      text-decoration:none;
      display:inline-block;
      position:relative;
    }

    /* 🌟 CARDS */
    .grid{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:25px;
      padding:40px 15px;
      perspective:1000px;
    }

    .card{
      width:260px;
      background:linear-gradient(145deg,#1c1c1c,#0f0f0f);
      border-radius:15px;
      overflow:hidden;
      transition:0.5s;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      animation: floatCard 4s ease-in-out infinite;
    }

    .card:hover{
      transform:translateY(-15px) rotateY(8deg);
      box-shadow:0 20px 50px rgba(255,215,0,0.2);
    }

    @keyframes floatCard{
      0%{transform:translateY(0px);}
      50%{transform:translateY(-10px);}
      100%{transform:translateY(0px);}
    }

    .card img{
      width:100%;
      height:190px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
      text-align:center;
    }

    .card h3{
      color:gold;
      margin:5px 0;
    }

    .card p{
      color:#bbb;
      font-size:13px;
    }

    .card-btn{
      display:inline-block;
      padding:8px 14px;
      background:gold;
      color:black;
      text-decoration:none;
      font-weight:bold;
      border-radius:5px;
      margin-top:8px;
    }

    /* 📱 MOBILE */
    @media (max-width:768px){
      .hero h1{font-size:24px;}
      .grid{flex-direction:column;align-items:center;}
      .card{width:90%;}
      nav a{display:block;margin:5px 0;}
      .digital-clock{font-size:30px;}
    }

  </style>
</head>

<body>

<header>
  <h2>Watch Heritage</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="luxury.html">Luxury</a>
    <a href="sports.html">Sports</a>
    <a href="fashion.html">Fashion</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- 🌟 HERO -->
<div class="hero">

  <div class="clock-bg"></div>

  <h1>Luxury Watches for Everyone</h1>
  <p>Premium • Stylish • Timeless</p>

  <!-- ⏰ LIVE CLOCK -->
  <div class="digital-clock" id="clock">00:00:00</div>

  <a href="luxury.html" class="btn">Shop Now</a>

</div>

<!-- 🌟 CARDS -->
<div class="grid">

  <div class="card">
    <img src="lux1.jpg">
    <div class="card-content">
      <h3>Luxury</h3>
      <p>Elite premium watch collection</p>
      <a class="card-btn" href="luxury.html">Explore</a>
    </div>
  </div>

  <div class="card">
    <img src="sport1.jpg">
    <div class="card-content">
      <h3>Sports</h3>
      <p>Performance & durability watches</p>
      <a class="card-btn" href="sports.html">Explore</a>
    </div>
  </div>

  <div class="card">
    <img src="fashion1.jpg">
    <div class="card-content">
      <h3>Fashion</h3>
      <p>Modern stylish everyday watches</p>
      <a class="card-btn" href="fashion.html">Explore</a>
    </div>
  </div>

</div>

<!-- ⏰ CLOCK SCRIPT -->
<script>
function updateClock(){
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let s = now.getSeconds();

  h = h < 10 ? "0" + h : h;
  m = m < 10 ? "0" + m : m;
  s = s < 10 ? "0" + s : s;

  document.getElementById("clock").innerText = h + ":" + m + ":" + s;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
