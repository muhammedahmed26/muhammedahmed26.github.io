<!DOCTYPE html>
<html>
<head>
  <title>Watch Heritage</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111;
      position:sticky;
      top:0;
      z-index:1000;
    }

    nav a{
      color:gold;
      margin:6px;
      text-decoration:none;
      font-weight:bold;
      display:inline-block;
      padding:6px 10px;
    }

    /* 🌌 HERO FULL ANIMATION */
    .hero{
      text-align:center;
      padding:110px 15px;
      position:relative;
      overflow:hidden;
      background: radial-gradient(circle at center, #111 0%, #000 60%, #000 100%);
    }

    /* floating watch */
    .hero::before{
      content:"⌚";
      position:absolute;
      font-size:80px;
      opacity:0.08;
      top:20%;
      left:-100px;
      animation: float1 12s linear infinite;
    }

    /* floating gear */
    .hero::after{
      content:"⚙️";
      position:absolute;
      font-size:90px;
      opacity:0.06;
      bottom:10%;
      right:-120px;
      animation: float2 10s linear infinite;
    }

    /* ticking circle */
    .clock-bg{
      position:absolute;
      width:320px;
      height:320px;
      border:2px solid rgba(255,215,0,0.08);
      border-radius:50%;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      animation: tick 1s infinite steps(2);
    }

    @keyframes tick{
      0% {transform:translate(-50%,-50%) scale(1);}
      50% {transform:translate(-50%,-50%) scale(1.03);}
      100% {transform:translate(-50%,-50%) scale(1);}
    }

    @keyframes float1{
      0% {transform:translateX(0) rotate(0deg);}
      100% {transform:translateX(120vw) rotate(360deg);}
    }

    @keyframes float2{
      0% {transform:translateX(0) rotate(0deg);}
      100% {transform:translateX(-120vw) rotate(-360deg);}
    }

    .hero h1{
      font-size:34px;
      margin:0;
      position:relative;
    }

    .hero p{
      color:#bbb;
      font-size:14px;
      margin:10px 0 20px;
      position:relative;
    }

    .btn{
      background:gold;
      color:black;
      padding:12px 20px;
      border:none;
      font-weight:bold;
      border-radius:5px;
      text-decoration:none;
      display:inline-block;
      position:relative;
    }

    .grid{
      display:flex;
      flex-wrap:wrap;
      justify-content:center;
      padding:15px;
      gap:15px;
    }

    .card{
      background:#1c1c1c;
      width:250px;
      border-radius:10px;
      overflow:hidden;
      transition:0.3s;
    }

    .card:hover{
      transform:scale(1.05);
    }

    .card img{
      width:100%;
      height:180px;
      object-fit:cover;
    }

    .card h3{
      text-align:center;
      padding:10px;
    }

    /* 📱 MOBILE FIX */
    @media (max-width:768px){
      .hero h1{font-size:24px;}
      .grid{flex-direction:column;align-items:center;}
      .card{width:90%;}
      nav a{display:block;margin:5px 0;}
    }
  </style>
</head>

<body>

<header>
  <h2>Watch Heritage</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="luxury.html">Luxury</a>
    <a href="sports.html">Sports</a>
    <a href="fashion.html">Fashion</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<div class="hero">
  <div class="clock-bg"></div>

  <h1>Luxury Watches for Everyone</h1>
  <p>Premium • Affordable • Stylish</p>
  <a href="luxury.html" class="btn">Shop Now</a>
</div>

<div class="grid">

  <div class="card">
    <img src="lux1.jpg">
    <h3>Luxury Collection</h3>
  </div>

  <div class="card">
    <img src="sport1.jpg">
    <h3>Sports Collection</h3>
  </div>

  <div class="card">
    <img src="fashion1.jpg">
    <h3>Fashion Collection</h3>
  </div>

</div>

</body>
</html>
