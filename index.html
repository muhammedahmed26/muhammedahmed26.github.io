<!DOCTYPE html>
<html>
<head>
  <title>Watch Heritage</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      overflow-x:hidden;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111;
      position:sticky;
      top:0;
      z-index:1000;
    }

    nav a{
      color:gold;
      margin:6px;
      text-decoration:none;
      font-weight:bold;
      display:inline-block;
      padding:6px 10px;
    }

    /* 🌟 HERO SLIDESHOW */
    .hero{
      position:relative;
      height:65vh;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      overflow:hidden;
    }

    .slide{
      position:absolute;
      width:100%;
      height:100%;
      background-size:cover;
      background-position:center;
      background-repeat:no-repeat;
      opacity:0;
      animation:slideShow 12s infinite;
      transform:scale(1.05);
    }

    .slide:nth-child(1){background-image:url("lux1.jpg"); animation-delay:0s;}
    .slide:nth-child(2){background-image:url("sport1.jpg"); animation-delay:4s;}
    .slide:nth-child(3){background-image:url("fashion1.jpg"); animation-delay:8s;}

    /* 🔥 smooth fade slideshow */
    @keyframes slideShow{
      0%{opacity:0;}
      10%{opacity:1;}
      30%{opacity:1;}
      40%{opacity:0;}
      100%{opacity:0;}
    }

    /* 🌑 overlay fixes pixel look */
    .hero::after{
      content:"";
      position:absolute;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.45);
      z-index:1;
    }

    .hero-text{
      position:relative;
      z-index:2;
      animation: glow 2s infinite alternate;
    }

    @keyframes glow{
      from{text-shadow:0 0 10px gold;}
      to{text-shadow:0 0 25px gold;}
    }

    .hero h1{
      font-size:34px;
      margin:0;
    }

    .hero p{
      color:#ccc;
      font-size:14px;
      margin:10px 0 20px;
    }

    .btn{
      background:gold;
      color:black;
      padding:12px 20px;
      border:none;
      font-weight:bold;
      border-radius:5px;
      text-decoration:none;
      display:inline-block;
    }

    /* 🌟 3D FLOATING CARDS */
    .grid{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:25px;
      padding:40px 15px;
      perspective:1000px;
    }

    .card{
      width:260px;
      background:linear-gradient(145deg,#1c1c1c,#0f0f0f);
      border-radius:15px;
      overflow:hidden;
      transition:0.5s;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
      animation: floatCard 4s ease-in-out infinite;
    }

    .card:hover{
      transform:translateY(-15px) rotateY(8deg);
      box-shadow:0 20px 50px rgba(255,215,0,0.2);
    }

    @keyframes floatCard{
      0%{transform:translateY(0px);}
      50%{transform:translateY(-10px);}
      100%{transform:translateY(0px);}
    }

    .card img{
      width:100%;
      height:190px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
      text-align:center;
    }

    .card h3{
      color:gold;
      margin:5px 0;
    }

    .card p{
      color:#bbb;
      font-size:13px;
    }

    .card-btn{
      display:inline-block;
      padding:8px 14px;
      background:gold;
      color:black;
      text-decoration:none;
      font-weight:bold;
      border-radius:5px;
      margin-top:8px;
    }

    /* 📱 MOBILE */
    @media (max-width:768px){
      .hero h1{font-size:24px;}
      .grid{flex-direction:column;align-items:center;}
      .card{width:90%;}
      nav a{display:block;margin:5px 0;}
    }

  </style>
</head>

<body>

<header>
  <h2>Watch Heritage</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="luxury.html">Luxury</a>
    <a href="sports.html">Sports</a>
    <a href="fashion.html">Fashion</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- 🌟 HERO -->
<div class="hero">

  <div class="slide"></div>
  <div class="slide"></div>
  <div class="slide"></div>

  <div class="hero-text">
    <h1>Luxury Watches for Everyone</h1>
    <p>Premium • Stylish • Timeless</p>
    <a href="luxury.html" class="btn">Shop Now</a>
  </div>

</div>

<!-- 🌟 CARDS -->
<div class="grid">

  <div class="card">
    <img src="lux1.jpg">
    <div class="card-content">
      <h3>Luxury</h3>
      <p>Elite premium watch collection</p>
      <a class="card-btn" href="luxury.html">Explore</a>
    </div>
  </div>

  <div class="card">
    <img src="sport1.jpg">
    <div class="card-content">
      <h3>Sports</h3>
      <p>Performance & durability watches</p>
      <a class="card-btn" href="sports.html">Explore</a>
    </div>
  </div>

  <div class="card">
    <img src="fashion1.jpg">
    <div class="card-content">
      <h3>Fashion</h3>
      <p>Modern stylish everyday watches</p>
      <a class="card-btn" href="fashion.html">Explore</a>
    </div>
  </div>

</div>

</body>
</html>
