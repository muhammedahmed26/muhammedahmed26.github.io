<!DOCTYPE html>
<html>
<head>
  <title>Watch Heritage</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      overflow:hidden;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111;
      position:sticky;
      top:0;
      z-index:10;
    }

    nav a{
      color:gold;
      margin:6px;
      text-decoration:none;
      font-weight:bold;
      display:inline-block;
      padding:6px 10px;
    }

    /* 🌟 HERO */
    .hero{
      height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      flex-direction:column;
      position:relative;
      text-align:center;
      background:#000;
    }

    /* 🕒 SINGLE FAINT CLOCK BACKGROUND (NOT SECOND CLOCK) */
    .hero::before{
      content:"";
      position:absolute;
      width:380px;
      height:380px;
      border-radius:50%;
      border:2px solid rgba(255,215,0,0.06);
      box-shadow:0 0 80px rgba(255,215,0,0.03);
    }

    /* ⏰ ONLY LIVE CLOCK */
    .clock{
      font-size:70px;
      font-weight:bold;
      color:gold;
      letter-spacing:3px;
      text-shadow:0 0 20px rgba(255,215,0,0.5);
      z-index:2;
    }

    .tag{
      margin-top:10px;
      color:#bbb;
      z-index:2;
    }

  </style>
</head>

<body>

<header>
  <h2>Watch Heritage</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="luxury.html">Luxury</a>
    <a href="sports.html">Sports</a>
    <a href="fashion.html">Fashion</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- 🌟 HERO -->
<div class="hero">

  <!-- ONLY LIVE CLOCK -->
  <div class="clock" id="clock">00:00:00</div>

  <div class="tag">Luxury Time Display</div>

</div>

<!-- ⏰ SCRIPT -->
<script>
function updateClock(){
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let s = now.getSeconds();

  h = h < 10 ? "0" + h : h;
  m = m < 10 ? "0" + m : m;
  s = s < 10 ? "0" + s : s;

  document.getElementById("clock").innerText =
    h + ":" + m + ":" + s;
}

setInterval(updateClock, 1000);
updateClock();
</script>

</body>
</html>
