<!DOCTYPE html>
<html>
<head>
  <title>Watch Heritage</title>

  <style>
    body{
      margin:0;
      font-family:Arial;
      background:#0f0f0f;
      color:white;
      overflow-x:hidden;
    }

    header{
      padding:15px;
      text-align:center;
      background:#111;
      position:sticky;
      top:0;
      z-index:1000;
    }

    nav a{
      color:gold;
      margin:6px;
      text-decoration:none;
      font-weight:bold;
      display:inline-block;
      padding:6px 10px;
    }

    /* 🌟 HERO */
    .hero{
      text-align:center;
      padding:110px 15px;
      position:relative;
      overflow:hidden;
      background: radial-gradient(circle at center, #111 0%, #000 60%, #000 100%);
    }

    /* 🕒 LARGE FAINT LIVE CLOCK BACKGROUND */
    .bg-clock{
      position:absolute;
      top:50%;
      left:50%;
      transform:translate(-50%,-50%);
      font-size:160px;
      font-weight:bold;
      color:rgba(255,215,0,0.05);
      letter-spacing:8px;
      user-select:none;
      white-space:nowrap;
    }

    .hero h1{
      font-size:34px;
      margin:0;
      position:relative;
    }

    .hero p{
      color:#bbb;
      font-size:14px;
      margin:10px 0 20px;
      position:relative;
    }

    .btn{
      background:gold;
      color:black;
      padding:12px 20px;
      border:none;
      font-weight:bold;
      border-radius:5px;
      text-decoration:none;
      display:inline-block;
      position:relative;
    }

    /* 🌟 CARDS */
    .grid{
      display:flex;
      justify-content:center;
      flex-wrap:wrap;
      gap:25px;
      padding:40px 15px;
    }

    .card{
      width:260px;
      background:linear-gradient(145deg,#1c1c1c,#0f0f0f);
      border-radius:15px;
      overflow:hidden;
      transition:0.5s;
      box-shadow:0 10px 30px rgba(0,0,0,0.6);
    }

    .card:hover{
      transform:translateY(-10px);
      box-shadow:0 20px 50px rgba(255,215,0,0.15);
    }

    .card img{
      width:100%;
      height:190px;
      object-fit:cover;
    }

    .card-content{
      padding:15px;
      text-align:center;
    }

    .card h3{
      color:gold;
      margin:5px 0;
    }

    .card p{
      color:#bbb;
      font-size:13px;
    }

    .card-btn{
      display:inline-block;
      padding:8px 14px;
      background:gold;
      color:black;
      text-decoration:none;
      font-weight:bold;
      border-radius:5px;
      margin-top:8px;
    }

    /* 📱 MOBILE */
    @media (max-width:768px){
      .hero h1{font-size:24px;}
      .grid{flex-direction:column;align-items:center;}
      .card{width:90%;}
      nav a{display:block;margin:5px 0;}
      .bg-clock{font-size:90px;}
    }

  </style>
</head>

<body>

<header>
  <h2>Watch Heritage</h2>

  <nav>
    <a href="index.html">Home</a>
    <a href="luxury.html">Luxury</a>
    <a href="sports.html">Sports</a>
    <a href="fashion.html">Fashion</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<!-- 🌟 HERO -->
<div class="hero">

  <!-- 🕒 LIVE BACKGROUND CLOCK -->
  <div class="bg-clock" id="bgClock">00:00:00</div>

  <h1>Luxury Watches for Everyone</h1>
  <p>Premium • Stylish • Timeless</p>

  <a href="luxury.html" class="btn">Shop Now</a>

</div>

<!-- 🌟 CARDS -->
<div class="grid">

  <div class="card">
    <img src="lux1.jpg">
    <div class="card-content">
      <h3>Luxury</h3>
      <p>Elite premium watch collection</p>
      <a class="card-btn" href="luxury.html">Explore</a>
    </div>
  </div>

  <div class="card">
    <img src="sport1.jpg">
    <div class="card-content">
      <h3>Sports</h3>
      <p>Performance & durability watches</p>
      <a class="card-btn" href="sports.html">Explore</a>
    </div>
  </div>

  <div class="card">
    <img src="fashion1.jpg">
    <div class="card-content">
      <h3>Fashion</h3>
      <p>Modern stylish everyday watches</p>
      <a class="card-btn" href="fashion.html">Explore</a>
    </div>
  </div>

</div>

<!-- ⏰ CLOCK SCRIPT -->
<script>
function updateClock(){
  const now = new Date();

  let h = now.getHours();
  let m = now.getMinutes();
  let s = now.getSeconds();

  h = h < 10 ? "0" + h : h;
  m = m < 10 ? "0" + m : m;
  s = s < 10 ? "0" + s : s;

  document.getElementById("bgClock").innerText =
    h + ":" + m + ":" + s;
}

setInterval(updateClock,1000);
updateClock();
</script>

</body>
</html>
